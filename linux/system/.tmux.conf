# Prefixo mais fácil (Ctrl+a como no screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Status bar sempre visível, atualiza a cada 5s
set -g status on
set -g status-interval 5

# Posição da barra embaixo (padrão)
set -g status-position bottom

# Lista de janelas clara no centro da barra
set -g status-justify centre
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-separator " | "

# Cor da janela ativa (destacada)
set -g window-status-current-style bg=red,fg=white,bold

# Lado esquerdo: nome da sessão
set -g status-left " #{session_name} "

# Lado direito: hora, data e host
set -g status-right " %H:%M %d/%m/%Y #[fg=green]#H "

# Cores gerais da barra (fundo escuro, texto claro)
set -g status-style bg=black,fg=green

# Divisões de panes mais intuitivas (Ctrl+a % ou ")
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Navegação entre panes com vim-like (se você usa vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Mouse opcional (para rolar, redimensionar panes)
set -g mouse on


# Cria layout automático ao iniciar sessão: 4 janelas, última com split vertical
set-hook -g session-created '
  rename-window "1-shell"
  new-window -n "2-logs"
  new-window -n "3-editor"
  new-window -n "4-monitor"; select-pane -t 0; split-window -v -p 50
  select-window -t 1
'

# Reload configuration
bind r source-file ~/.tmux.conf \; display-message "Configuration reloaded!"

# Edit configuration file
bind e new-window -n "tmux-config" "vi ~/.tmux.conf"
